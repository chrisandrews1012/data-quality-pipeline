name: CI

# TODO: add test-llm job that runs on push to main with ANTHROPIC_API_KEY secret
# TODO: add scheduled eval workflow that commits scorecard.md back to repo once real (non-synthetic) data is in use

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-fast:
    name: Deterministic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run fast tests
        run: uv run pytest tests/ -m "not llm" -v
