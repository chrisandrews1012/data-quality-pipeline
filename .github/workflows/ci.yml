name: CI

# TODO: add test-llm job that runs on push to main with ANTHROPIC_API_KEY secret

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  test-fast:
    name: Deterministic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run fast tests
        run: uv run pytest tests/ -m "not llm" -v

  eval-scorecard:
    name: Scheduled eval scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make eval

      - name: Commit scorecard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f evals/results/scorecard.md
          if git diff --cached --quiet; then
            echo "No scorecard changes to commit."
          else
            git commit -m "Update eval scorecard"
            git push
          fi
